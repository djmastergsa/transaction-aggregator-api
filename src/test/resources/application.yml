spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  data-sources:
    sync-on-startup: false
  security:
    jwt:
      secret: TestSecretKeyForJWTTokenGenerationAndItMustBe256BitsLong1234567
      expiration: 86400000
