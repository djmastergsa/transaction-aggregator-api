spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/transactiondb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      connection-timeout: 3000      # reject connection requests after 3 seconds
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000          # release idle connections after 5 minutes
      max-lifetime: 1200000         # replace connections after 20 minutes
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080
  tomcat:
    connection-timeout: 5000        # drop connections that don't send a request within 5 seconds
    threads:
      max: 50
      min-spare: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Transaction Aggregator API
    version: 1.0.0
    description: Capitec Software Engineering Assessment — Option 1

app:
  data-sources:
    sync-on-startup: true
  security:
    jwt:
      secret: TransactionAggregatorJWTSecretKeyForCapitecAssessment2024ABCDEF
      expiration: 86400000   # 24 hours in milliseconds

logging:
  level:
    com.capitec.aggregator: INFO
    org.springframework.web: WARN
